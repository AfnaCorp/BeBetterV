# Firebase App Hosting — config du backend
# Docs : https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 1

env:
  # --- Config Firebase client (publiques, exposées dans le bundle JS) ---
  # availability BUILD+RUNTIME car les NEXT_PUBLIC_* sont inlinées au build.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBdaUIwIKB4RLYgm2hqBqcVGOgiXzHqsb0
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: studio-8862957917-3ddd0.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: studio-8862957917-3ddd0
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: studio-8862957917-3ddd0.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1094889591184"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1094889591184:web:6327feb5b2e8eae3bbe315
    availability:
      - BUILD
      - RUNTIME

  # --- Modèles Gemini (non sensibles, défauts dans le code) ---
  - variable: GEMINI_TEXT_MODEL
    value: gemini-2.5-pro
    availability:
      - RUNTIME
  - variable: GEMINI_FAST_MODEL
    value: gemini-2.5-flash
    availability:
      - RUNTIME

  # --- Clé API Gemini (secret, Cloud Secret Manager) ---
  - variable: GOOGLE_API_KEY
    secret: GOOGLE_API_KEY
    availability:
      - RUNTIME

# Credential admin : aucun secret nécessaire.
# Le runtime App Hosting fournit un service account via Application Default
# Credentials (cf. lib/firebase/admin.ts -> applicationDefault()).
